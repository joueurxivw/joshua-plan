<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Joshua Plan">
<meta name="theme-color" content="#080808">
<title>Joshua Plan v2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --surface: #141414;
  --surface2: #1a1a1a;
  --surface3: #222222;
  --border: #2a2a2a;
  --border2: #333;
  --text: #f0ede8;
  --text2: #b0ad a8;
  --muted: #666;
  --muted2: #444;

  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --amber-glow: 0 0 30px rgba(245,158,11,0.2);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.12);
  --orange: #f97316;
  --teal: #14b8a6;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);

  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
}

[data-theme="light"] {
  --bg: #f5f3ef;
  --bg2: #eeebe6;
  --surface: #ffffff;
  --surface2: #f5f3ef;
  --surface3: #eeebe6;
  --border: #e0ddd8;
  --border2: #d0cdc8;
  --text: #1a1a1a;
  --muted: #999;
  --muted2: #ccc;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100dvh;
  overflow: hidden;
  padding-top: var(--safe-top);
}

/* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: calc(100dvh - var(--safe-top));
}

/* ── TOP HEADER ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: rgba(8,8,8,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 60;
}
[data-theme="light"] .top-bar { background: rgba(245,243,239,0.95); }
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: .1em;
  color: var(--amber);
}
.logo em { color: var(--text); font-style: normal; }
.top-date { font-size: 11px; color: var(--muted); line-height: 1.4; text-align: right; }
.top-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 32px; height: 32px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.icon-btn:active { background: var(--amber-dim); color: var(--amber); border-color: var(--amber); }

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.main-content::-webkit-scrollbar { display: none; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  display: flex;
  background: rgba(14,14,14,0.97);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(8px + var(--safe-bot));
  flex-shrink: 0;
  z-index: 60;
  backdrop-filter: blur(20px);
}
[data-theme="light"] .bottom-nav { background: rgba(255,255,255,0.97); }
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 4px 0;
  transition: all .15s;
  border: none;
  background: none;
  color: var(--muted);
}
.nav-item.active { color: var(--amber); }
.nav-item .nav-icon { font-size: 20px; line-height: 1; }
.nav-item .nav-label { font-size: 10px; font-weight: 600; letter-spacing: .04em; }

/* ═══════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════ */
.view { display: none; padding: 16px; padding-bottom: 20px; }
.view.active { display: block; }

/* ═══════════════════════════════════════════
   COMMON COMPONENTS
═══════════════════════════════════════════ */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: .12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 4px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: .06em;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
}
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

/* STAT CARDS */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: .04em;
  color: var(--amber);
  line-height: 1;
}
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 500; }

/* PROGRESS BAR */
.progress-wrap { background: var(--surface3); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 4px; transition: width .4s ease; }

/* FORM ELEMENTS */
.form-group { margin-bottom: 12px; }
.form-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
  appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--amber); }
.form-textarea { resize: none; height: 80px; line-height: 1.5; }
.form-select option { background: #1a1a1a; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* BUTTONS */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 14px; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; border: none; transition: all .15s;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--amber); color: #000; }
.btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.3); margin-top: 8px; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }
.btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 9px; width: auto; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 200;
  backdrop-filter: blur(6px);
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 20px 18px calc(20px + var(--safe-bot));
  width: 100%; max-width: 600px;
  max-height: 92dvh; overflow-y: auto;
  animation: slideUp .28s cubic-bezier(.16,1,.3,1);
}
.modal-sheet::-webkit-scrollbar { display: none; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: .06em;
  color: var(--amber); margin-bottom: 18px;
}

/* COLOR PICKER */
.color-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
  border: 2px solid transparent; transition: all .15s;
}
.color-swatch.selected { border-color: #fff; transform: scale(1.15); }

/* EMOJI PICKER */
.emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.emoji-opt {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.emoji-opt.selected { background: var(--amber-dim); border-color: var(--amber); }

/* FAB */
.fab {
  position: fixed; bottom: calc(72px + var(--safe-bot)); right: 16px;
  width: 52px; height: 52px;
  background: var(--amber); color: #000;
  border: none; border-radius: 16px; font-size: 24px; font-weight: 700;
  cursor: pointer; z-index: 40;
  box-shadow: 0 6px 20px rgba(245,158,11,0.35);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.fab:active { transform: scale(.9); }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* STATUS BADGE */
.status-badge {
  font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 6px;
}
.status-todo { background: rgba(100,100,100,0.2); color: #999; }
.status-doing { background: var(--blue-dim); color: var(--blue); }
.status-done { background: var(--green-dim); color: var(--green); }
.status-delayed { background: rgba(245,158,11,0.15); color: var(--amber); }
.status-cancelled { background: var(--red-dim); color: var(--red); }

/* PRIORITY */
.prio-low { color: var(--green); }
.prio-med { color: var(--amber); }
.prio-high { color: var(--red); }

/* ═══════════════════════════════════════════
   CALENDRIER — TIMELINE
═══════════════════════════════════════════ */
.week-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.week-label { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: .05em; }
.wk-arrow {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); width: 32px; height: 32px; border-radius: 9px;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.wk-arrow:active { background: var(--amber-dim); color: var(--amber); border-color: var(--amber); }

.days-strip {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 14px;
}
.day-cell {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 3px; text-align: center; cursor: pointer; transition: all .15s;
}
.day-cell.active { background: var(--amber); border-color: var(--amber); }
.day-cell.active .dc-name, .day-cell.active .dc-num { color: #000 !important; }
.day-cell.today { border-color: var(--amber); }
.dc-name { font-size: 9px; color: var(--muted); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
.dc-num { font-size: 15px; font-weight: 600; margin-top: 1px; }
.dc-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--amber); margin: 2px auto 0; opacity: 0; }
.day-cell.has-b .dc-dot { opacity: 1; }

/* TIMELINE GRID */
.timeline-wrap {
  position: relative;
  overflow: hidden;
}
.tl-grid {
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 0;
}
.tl-hours {
  display: flex; flex-direction: column;
}
.tl-hour-label {
  font-size: 10px; color: var(--muted); font-weight: 500;
  text-align: right; padding-right: 8px;
  flex-shrink: 0;
}
.tl-blocks-col {
  position: relative;
  border-left: 1px solid var(--border);
}
.tl-hour-line {
  position: absolute; left: 0; right: 0;
  border-top: 1px solid var(--border);
  pointer-events: none;
}
.tl-hour-line.half { border-top-style: dashed; opacity: .4; }
.tl-block {
  position: absolute; left: 4px; right: 4px;
  border-radius: 8px; padding: 5px 8px;
  cursor: pointer; border-left: 3px solid;
  transition: opacity .15s;
  overflow: hidden;
  z-index: 2;
}
.tl-block:active { opacity: .75; }
.tl-block-title { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-block-meta { font-size: 10px; opacity: .7; margin-top: 1px; }
.tl-block-status { font-size: 9px; opacity: .8; margin-top: 2px; }
.tl-now-line {
  position: absolute; left: 0; right: 0; height: 2px; background: var(--red); z-index: 3;
  pointer-events: none;
}
.tl-now-line::before {
  content: ''; position: absolute; left: -4px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%; background: var(--red);
}
.tl-add-btn {
  position: absolute; right: 6px; bottom: 2px;
  font-size: 10px; color: var(--muted); cursor: pointer; opacity: 0;
  transition: opacity .15s;
}
.tl-hour-slot:hover .tl-add-btn { opacity: 1; }

/* ═══════════════════════════════════════════
   PROJETS
═══════════════════════════════════════════ */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .15s;
}
.project-card:active { opacity: .8; }
.proj-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.proj-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.proj-name { font-size: 15px; font-weight: 700; }
.proj-dates { font-size: 11px; color: var(--muted); margin-top: 1px; }
.proj-progress-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--muted); margin-bottom: 5px;
}

/* PROJECT DETAIL */
.proj-detail-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  padding: 16px; background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.proj-detail-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.proj-detail-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .06em; }
.proj-detail-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ═══════════════════════════════════════════
   BUDGET / FINANCES
═══════════════════════════════════════════ */
.balance-hero {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  margin-bottom: 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.balance-hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
.balance-label { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
.balance-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 44px;
  letter-spacing: .04em; color: var(--amber); line-height: 1;
}
.balance-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
.balance-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.bal-box { background: var(--surface3); border-radius: 10px; padding: 12px; text-align: center; }
.bal-box-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .04em; }
.bal-box-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

.finance-tabs {
  display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none;
}
.finance-tabs::-webkit-scrollbar { display: none; }
.fin-tab {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600; background: var(--surface2);
  border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s;
}
.fin-tab.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }

.transaction-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
}
.transaction-item:last-child { border-bottom: none; }
.tx-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.tx-name { font-size: 13px; font-weight: 600; }
.tx-cat { font-size: 11px; color: var(--muted); margin-top: 1px; }
.tx-amount { margin-left: auto; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: .04em; }
.tx-amount.income { color: var(--green); }
.tx-amount.expense { color: var(--red); }

.budget-bar-item { margin-bottom: 12px; }
.budget-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.budget-bar-name { font-size: 12px; font-weight: 600; }
.budget-bar-amounts { font-size: 11px; color: var(--muted); }

/* DONUT CHART */
.donut-wrap { position: relative; width: 130px; height: 130px; margin: 0 auto 14px; }
.donut-wrap svg { transform: rotate(-90deg); }
.donut-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.donut-total { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .04em; color: var(--amber); }
.donut-sub { font-size: 10px; color: var(--muted); }

.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-right { margin-left: auto; font-weight: 600; font-size: 12px; }

/* ═══════════════════════════════════════════
   JOURNAL
═══════════════════════════════════════════ */
.journal-entry {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
  position: relative;
}
.je-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.je-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.je-proj { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.je-date { font-size: 10px; color: var(--muted); margin-left: auto; }
.je-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.je-note { font-size: 12px; color: var(--muted); line-height: 1.6; }
.je-delete { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }

/* ═══════════════════════════════════════════
   RAPPORT / RÉSUMÉ
═══════════════════════════════════════════ */
.report-section { margin-bottom: 18px; }
.report-section-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: .1em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.report-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.report-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px; background: var(--surface2); border-radius: 10px; margin-bottom: 6px;
}
.report-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.report-name { font-size: 12px; font-weight: 600; }
.report-reason { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ═══════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════ */
.settings-section { margin-bottom: 20px; }
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 6px; cursor: pointer;
}
.settings-row:active { opacity: .8; }
.settings-label { font-size: 13px; font-weight: 500; }
.settings-value { font-size: 12px; color: var(--muted); }
.settings-arrow { color: var(--muted); font-size: 12px; }
.toggle {
  width: 44px; height: 24px; background: var(--surface3); border-radius: 12px;
  position: relative; cursor: pointer; transition: background .2s; border: none;
  flex-shrink: 0;
}
.toggle.on { background: var(--amber); }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 20px; height: 20px; background: #fff; border-radius: 50%;
  transition: transform .2s;
}
.toggle.on::after { transform: translateX(20px); }

/* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
::-webkit-scrollbar { width: 0; height: 0; }

/* ═══════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════ */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.view.active { animation: fadeIn .2s ease; }

/* PROJECT DETAIL OVERLAY */
.detail-overlay {
  display: none; position: fixed; inset: 0; background: var(--bg);
  z-index: 150; overflow-y: auto; padding: var(--safe-top) 0 0;
}
.detail-overlay.open { display: block; }
.detail-nav {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
  background: rgba(8,8,8,0.95); backdrop-filter: blur(20px); z-index: 10;
}
.back-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 7px 14px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
}
.detail-content { padding: 16px; }
</style>
</head>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let state = JSON.parse(localStorage.getItem('jp_state') || 'null') || {
  blocks: [],
  projects: [

    { id:'travail',  name:'Travail',         emoji:'💼', color:'#6b7280', desc:'Patrick Morin',                start:'', end:'', progress:100,budget:0 },
    { id:'perso',    name:'Personnel',       emoji:'🌱', color:'#22c55e', desc:'Développement personnel',      start:'', end:'', progress:30, budget:0 },
    { id:'francais', name:'Français S5',     emoji:'📚', color:'#14b8a6', desc:'Cours en ligne',               start:'', end:'', progress:40, budget:0 },
  ],
  transactions: [],
  budgets: [],
  settings: { theme: 'dark', weekStart: 1, timeFormat: '24h' }
};
let currentWeekOffset = 0;
let selectedDay = null;
let editingBlockId = null;
let editingProjId = null;
let editingTxType = 'income';
let selectedProjId = 'memora';
let selectedProjColor = '#f59e0b';
let selectedProjEmoji = '🎨';
let currentDetailProjId = null;

const COLORS = ['#f59e0b','#ef4444','#22c55e','#3b82f6','#a855f7','#f97316','#14b8a6','#ec4899','#84cc16','#06b6d4','#6b7280','#fff'];
const EMOJIS = ['🎨','📷','🎬','💪','💼','🌱','📚','🚀','💡','🎯','🏆','💰','🎵','✈️','🏠','❤️','⚡','🔥','🌊','🎭'];
const CAT_ICONS = { salaire:'💼',contrat:'🤝',vente:'🛍',autre_rev:'✨',nourriture:'🍔',transport:'🚗',logement:'🏠',loisirs:'🎮',abonnements:'📱',achats:'🛒',sante:'❤️',restaurants:'🍽',epargne:'💎',projet:'🚀' };
const CAT_NAMES = { salaire:'Salaire',contrat:'Contrat',vente:'Vente',autre_rev:'Autre revenu',nourriture:'Nourriture',transport:'Transport',logement:'Logement',loisirs:'Loisirs',abonnements:'Abonnements',achats:'Achats',sante:'Santé',restaurants:'Restaurants',epargne:'Épargne',projet:'Projet' };
const STATUS_LABELS = { todo:'À faire', doing:'En cours', done:'Terminé', delayed:'Reporté', cancelled:'Annulé' };
const PRIO_LABELS = { low:'Faible', med:'Moyenne', high:'Élevée' };

function save() { localStorage.setItem('jp_state', JSON.stringify(state)); }

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const DAY_NAMES = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const DAY_FULL  = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MONTH_SHORT = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const MONTH_FULL = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekStart(offset=0) {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0 ? -6 : 1);
  d.setDate(diff + offset*7); d.setHours(0,0,0,0);
  return d;
}
function timeToMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function minToTime(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function proj(id) { return state.projects.find(p=>p.id===id) || {name:'?',color:'#666',emoji:'❓'}; }
function fmt$(n) { return '$' + Number(n||0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,','); }

/* ═══════════════════════════════════════════
   HEADER DATE
═══════════════════════════════════════════ */
function updateTopDate() {
  const d = new Date();
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  document.getElementById('topDate').innerHTML = `${days[d.getDay()]}<br>${d.getDate()} ${MONTH_FULL[d.getMonth()]}`;
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function switchView(id, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;
  if(id==='proj') renderProjects();
  if(id==='budget') renderBudget();
  if(id==='journal') renderJournal();
  if(id==='report') renderReport();
}

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e, id) { if(e.target===e.currentTarget) closeModal(id); }

/* ═══════════════════════════════════════════
   THEME
═══════════════════════════════════════════ */
function toggleTheme() {
  const curr = document.documentElement.getAttribute('data-theme');
  const next = curr === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'light' ? '🌙' : '☀️';
  state.settings.theme = next; save();
}
function applyTheme() {
  if(state.settings.theme === 'light') {
    document.documentElement.setAttribute('data-theme','light');
    document.getElementById('themeBtn').textContent = '☀️';
  }
}

/* ═══════════════════════════════════════════
   CALENDRIER — TIMELINE
═══════════════════════════════════════════ */
const HOUR_HEIGHT = 60; // px per hour
const TIMELINE_START = 6; // 6h
const TIMELINE_END = 23; // 23h

function changeWeek(dir) { currentWeekOffset += dir; selectedDay = null; renderCalendar(); }

function renderCalendar() {
  const ws = getWeekStart(currentWeekOffset);
  document.getElementById('weekLabel').textContent =
    `${ws.getDate()} ${MONTH_SHORT[ws.getMonth()]} – ${(()=>{const e=new Date(ws);e.setDate(e.getDate()+6);return e.getDate()+' '+MONTH_SHORT[e.getMonth()];})()}`;

  const today = dateKey(new Date());
  const strip = document.getElementById('daysStrip'); strip.innerHTML = '';

  for(let i=0; i<7; i++) {
    const d = new Date(ws); d.setDate(d.getDate()+i);
    const key = dateKey(d);
    const hasB = state.blocks.some(b=>b.date===key);
    const isToday = key === today;
    const isSel = selectedDay === key;
    const cell = document.createElement('div');
    cell.className = `day-cell${isToday?' today':''}${isSel?' active':''}${hasB?' has-b':''}`;
    cell.innerHTML = `<div class="dc-name">${DAY_NAMES[i]}</div><div class="dc-num">${d.getDate()}</div><div class="dc-dot"></div>`;
    cell.onclick = () => { selectedDay = key; renderCalendar(); };
    strip.appendChild(cell);
  }

  if(!selectedDay) {
    const wKeys = Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return dateKey(d);});
    selectedDay = wKeys.includes(today) ? today : dateKey(ws);
    renderCalendar(); return;
  }

  const [y,m,d] = selectedDay.split('-').map(Number);
  const dt = new Date(y,m-1,d);
  const dayIdx = (dt.getDay()+6)%7;
  document.getElementById('dayTitleLabel').textContent = `${DAY_FULL[dayIdx]} ${d} ${MONTH_FULL[m-1]}`;

  renderTimeline();
}

function renderTimeline() {
  const container = document.getElementById('timelineContainer');
  container.innerHTML = '';

  const totalHours = TIMELINE_END - TIMELINE_START;
  const totalHeight = totalHours * HOUR_HEIGHT;

  const wrap = document.createElement('div');
  wrap.style.cssText = `position:relative;`;

  const grid = document.createElement('div');
  grid.className = 'tl-grid';

  // Hours column
  const hoursCol = document.createElement('div');
  hoursCol.className = 'tl-hours';
  hoursCol.style.paddingTop = '0px';

  // Blocks column
  const blocksCol = document.createElement('div');
  blocksCol.className = 'tl-blocks-col';
  blocksCol.style.height = totalHeight + 'px';
  blocksCol.style.position = 'relative';

  for(let h=TIMELINE_START; h<=TIMELINE_END; h++) {
    const frac = (h - TIMELINE_START) / totalHours;
    const top = frac * totalHeight;

    // Hour label
    const lbl = document.createElement('div');
    lbl.className = 'tl-hour-label';
    lbl.textContent = `${String(h).padStart(2,'0')}:00`;
    lbl.style.cssText = `height:${HOUR_HEIGHT}px;line-height:1;padding-top:4px;`;
    hoursCol.appendChild(lbl);

    // Horizontal line
    const line = document.createElement('div');
    line.className = 'tl-hour-line';
    line.style.top = top + 'px';
    blocksCol.appendChild(line);

    // Half-hour dashed
    if(h < TIMELINE_END) {
      const halfLine = document.createElement('div');
      halfLine.className = 'tl-hour-line half';
      halfLine.style.top = (top + HOUR_HEIGHT/2) + 'px';
      blocksCol.appendChild(halfLine);
    }
  }

  // Now line
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  const startMin = TIMELINE_START*60;
  const endMin = TIMELINE_END*60;
  if(selectedDay === dateKey(now) && nowMin >= startMin && nowMin <= endMin) {
    const nowLine = document.createElement('div');
    nowLine.className = 'tl-now-line';
    nowLine.style.top = ((nowMin - startMin) / (endMin - startMin) * totalHeight) + 'px';
    blocksCol.appendChild(nowLine);
  }

  // Blocks
  const dayBlocks = state.blocks.filter(b=>b.date===selectedDay);
  dayBlocks.forEach(b => {
    const startMin = timeToMin(b.start);
    const endMin = timeToMin(b.end);
    const tlStart = TIMELINE_START * 60;
    const tlEnd = TIMELINE_END * 60;
    const top = Math.max(0, (startMin - tlStart) / (tlEnd - tlStart) * totalHeight);
    const height = Math.max(22, (Math.min(endMin, tlEnd) - Math.max(startMin, tlStart)) / (tlEnd - tlStart) * totalHeight - 2);

    const p = proj(b.project);
    const el = document.createElement('div');
    el.className = 'tl-block';
    el.style.cssText = `top:${top}px;height:${height}px;background:${p.color}18;border-left-color:${p.color};`;
    if(b.status==='done') el.style.opacity = '.6';
    if(b.status==='cancelled') el.style.cssText += 'text-decoration:line-through;opacity:.4;';

    const statusClass = `status-${b.status||'todo'}`;
    el.innerHTML = `
      <div class="tl-block-title">${p.emoji} ${b.title}</div>
      ${height > 35 ? `<div class="tl-block-meta">${b.start}–${b.end}</div>` : ''}
      ${height > 55 && b.note ? `<div class="tl-block-meta" style="margin-top:3px;font-style:italic;">${b.note.substring(0,40)}…</div>` : ''}
    `;
    el.onclick = () => openEditBlock(b.id);
    blocksCol.appendChild(el);
  });

  // Click on empty area to add
  blocksCol.onclick = (e) => {
    if(e.target === blocksCol) {
      const rect = blocksCol.getBoundingClientRect();
      const clickY = e.clientY - rect.top;
      const clickMin = Math.round((clickY / totalHeight) * (endMin - startMin) / 15) * 15 + startMin;
      const st = minToTime(Math.max(startMin, Math.min(endMin-60, clickMin)));
      const en = minToTime(Math.min(endMin, timeToMin(st)+60));
      resetBlockModal();
      document.getElementById('bStart').value = st;
      document.getElementById('bEnd').value = en;
      openModal('addBlockModal');
    }
  };

  grid.appendChild(hoursCol);
  grid.appendChild(blocksCol);
  container.appendChild(grid);
}

function resetBlockModal() {
  editingBlockId = null;
  document.getElementById('blockModalTitle').textContent = 'Nouveau Bloc';
  document.getElementById('bTitle').value = '';
  document.getElementById('bDesc').value = '';
  document.getElementById('bNote').value = '';
  document.getElementById('bBudget').value = '';
  document.getElementById('bActual').value = '';
  document.getElementById('bReason').value = '';
  document.getElementById('bPriority').value = 'med';
  document.getElementById('bStatus').value = 'todo';
  document.getElementById('deleteBlockBtn').style.display = 'none';
  buildBlockProjChips();
}

function openEditBlock(id) {
  const b = state.blocks.find(x=>x.id===id); if(!b) return;
  editingBlockId = id;
  selectedProjId = b.project;
  document.getElementById('blockModalTitle').textContent = 'Modifier le bloc';
  document.getElementById('bTitle').value = b.title || '';
  document.getElementById('bDesc').value = b.desc || '';
  document.getElementById('bStart').value = b.start;
  document.getElementById('bEnd').value = b.end;
  document.getElementById('bNote').value = b.note || '';
  document.getElementById('bPriority').value = b.priority || 'med';
  document.getElementById('bStatus').value = b.status || 'todo';
  document.getElementById('bBudget').value = b.budget || '';
  document.getElementById('bActual').value = b.actual || '';
  document.getElementById('bReason').value = b.reason || '';
  document.getElementById('deleteBlockBtn').style.display = 'flex';
  buildBlockProjChips();
  openModal('addBlockModal');
}

function buildBlockProjChips() {
  const c = document.getElementById('blockProjChips'); c.innerHTML = '';
  state.projects.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'fin-tab' + (p.id===selectedProjId ? ' active' : '');
    chip.style.borderColor = p.id===selectedProjId ? p.color : '';
    chip.style.color = p.id===selectedProjId ? p.color : '';
    chip.style.background = p.id===selectedProjId ? p.color+'20' : '';
    chip.textContent = p.emoji + ' ' + p.name;
    chip.onclick = () => { selectedProjId = p.id; buildBlockProjChips(); };
    c.appendChild(chip);
  });
}

function saveBlock() {
  const title = document.getElementById('bTitle').value.trim();
  const start = document.getElementById('bStart').value;
  const end = document.getElementById('bEnd').value;
  if(!title || !start || !end) { alert('Titre et heures requis !'); return; }

  const block = {
    id: editingBlockId || Date.now().toString(),
    date: selectedDay || dateKey(new Date()),
    project: selectedProjId,
    title, desc: document.getElementById('bDesc').value.trim(),
    start, end,
    note: document.getElementById('bNote').value.trim(),
    priority: document.getElementById('bPriority').value,
    status: document.getElementById('bStatus').value,
    budget: parseFloat(document.getElementById('bBudget').value) || 0,
    actual: parseFloat(document.getElementById('bActual').value) || 0,
    reason: document.getElementById('bReason').value.trim(),
    created: editingBlockId ? (state.blocks.find(x=>x.id===editingBlockId)||{}).created : new Date().toISOString()
  };

  if(editingBlockId) {
    state.blocks = state.blocks.map(x => x.id===editingBlockId ? block : x);
  } else {
    state.blocks.push(block);
  }

  save(); closeModal('addBlockModal'); renderCalendar();
}

function deleteBlock() {
  if(!editingBlockId) return;
  if(!confirm('Supprimer ce bloc ?')) return;
  state.blocks = state.blocks.filter(x=>x.id!==editingBlockId);
  save(); closeModal('addBlockModal'); renderCalendar();
}

function setTxType(type) {
  editingTxType = type;
  document.getElementById('txTypeIncome').className = 'fin-tab' + (type==='income'?' active':'');
  document.getElementById('txTypeExpense').className = 'fin-tab' + (type==='expense'?' active':'');
}

function saveTx() {
  const amount = parseFloat(document.getElementById('txAmount').value);
  const desc = document.getElementById('txDesc').value.trim();
  if(!amount || !desc) { alert('Montant et description requis !'); return; }
  state.transactions.push({
    id: Date.now().toString(),
    type: editingTxType,
    amount, desc,
    cat: document.getElementById('txCat').value,
    date: document.getElementById('txDate').value || dateKey(new Date()),
    note: document.getElementById('txNote').value.trim()
  });
  save(); closeModal('addTxModal'); renderBudget();
}

function saveBudget() {
  const cat = document.getElementById('budgetCat').value;
  const amount = parseFloat(document.getElementById('budgetAmount').value);
  if(!amount) { alert('Montant requis !'); return; }
  const existing = state.budgets.find(b=>b.cat===cat);
  if(existing) { existing.amount = amount; }
  else { state.budgets.push({ id: Date.now().toString(), cat, amount }); }
  save(); closeModal('addBudgetModal'); renderBudget();
}

function switchFinTab(tab, btn) {
  document.querySelectorAll('#fin-transactions,#fin-budgets,#fin-stats').forEach(el=>el.style.display='none');
  document.getElementById('fin-'+tab).style.display = 'block';
  document.querySelectorAll('.fin-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(tab==='stats') renderDonut();
}

function renderBudget() {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthTx = state.transactions.filter(t=>t.date.startsWith(thisMonth));
  const income = monthTx.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const expense = monthTx.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const balance = income - expense;

  document.getElementById('balanceAmount').textContent = fmt$(balance);
  document.getElementById('balanceAmount').style.color = balance >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('totalIncome').textContent = fmt$(income);
  document.getElementById('totalExpense').textContent = fmt$(expense);

  // Transactions list
  const txList = document.getElementById('txList'); txList.innerHTML = '';
  const sorted = [...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  if(sorted.length===0) {
    txList.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">Aucune transaction.<br>Appuie sur + pour en ajouter.</div>';
  } else {
    sorted.forEach(t => {
      const el = document.createElement('div'); el.className = 'transaction-item';
      el.innerHTML = `
        <div class="tx-icon" style="background:${t.type==='income'?'var(--green-dim)':'var(--red-dim)'};">${CAT_ICONS[t.cat]||'💸'}</div>
        <div><div class="tx-name">${t.desc}</div><div class="tx-cat">${CAT_NAMES[t.cat]||t.cat} · ${t.date}</div></div>
        <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt$(t.amount)}</div>
      `;
      txList.appendChild(el);
    });
  }

  // Budgets
  const bList = document.getElementById('budgetsList'); bList.innerHTML = '';
  if(state.budgets.length===0) {
    bList.innerHTML = '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px;">Aucun budget. Crée-en un !</div>';
  } else {
    state.budgets.forEach(b => {
      const spent = monthTx.filter(t=>t.type==='expense'&&t.cat===b.cat).reduce((a,t)=>a+t.amount,0);
      const pct = Math.min(100, (spent/b.amount*100));
      const color = pct>90?'var(--red)':pct>70?'var(--amber)':'var(--green)';
      bList.innerHTML += `
        <div class="budget-bar-item">
          <div class="budget-bar-header">
            <span class="budget-bar-name">${CAT_ICONS[b.cat]||'💸'} ${CAT_NAMES[b.cat]||b.cat}</span>
            <span class="budget-bar-amounts">${fmt$(spent)} / ${fmt$(b.amount)} · ${fmt$(b.amount-spent)} restant</span>
          </div>
          <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${color};"></div></div>
        </div>`;
    });
  }
}

function renderDonut() {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const expenses = state.transactions.filter(t=>t.type==='expense'&&t.date.startsWith(thisMonth));
  const total = expenses.reduce((a,t)=>a+t.amount,0);
  document.getElementById('donutTotal').textContent = fmt$(total);

  // Group by cat
  const byCat = {};
  expenses.forEach(t=>{ byCat[t.cat] = (byCat[t.cat]||0)+t.amount; });
  const cats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  const CHART_COLORS = ['#f59e0b','#ef4444','#3b82f6','#22c55e','#a855f7','#f97316','#14b8a6','#ec4899'];
  const svg = document.getElementById('donutSvg'); svg.innerHTML = '';
  const legend = document.getElementById('donutLegend'); legend.innerHTML = '';

  if(total === 0) {
    svg.innerHTML = `<circle cx="50" cy="50" r="40" fill="none" stroke="var(--border)" stroke-width="16"/>`;
    legend.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;">Aucune dépense ce mois.</div>';
    return;
  }

  let offset = 0;
  const circumference = 2 * Math.PI * 40;
  cats.forEach(([ cat, amt ], i) => {
    const pct = amt / total;
    const dash = pct * circumference;
    const gap = circumference - dash;
    const color = CHART_COLORS[i % CHART_COLORS.length];
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx','50'); circle.setAttribute('cy','50'); circle.setAttribute('r','40');
    circle.setAttribute('fill','none'); circle.setAttribute('stroke',color);
    circle.setAttribute('stroke-width','16');
    circle.setAttribute('stroke-dasharray',`${dash} ${gap}`);
    circle.setAttribute('stroke-dashoffset', -offset);
    svg.appendChild(circle);
    offset += dash;

    legend.innerHTML += `
      <div class="legend-item">
        <div class="legend-dot" style="background:${color}"></div>
        <span>${CAT_ICONS[cat]||''} ${CAT_NAMES[cat]||cat}</span>
        <span class="legend-right" style="color:${color}">${fmt$(amt)} (${(pct*100).toFixed(0)}%)</span>
      </div>`;
  });
}

/* ═══════════════════════════════════════════
   JOURNAL
═══════════════════════════════════════════ */
function renderJournal() {
  const list = document.getElementById('journalList');
  const empty = document.getElementById('journalEmpty');
  const withNotes = [...state.blocks].filter(b=>b.note).reverse();
  if(withNotes.length===0) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  list.innerHTML = withNotes.map(b=>{
    const p = proj(b.project);
    return `<div class="journal-entry">
      <button class="je-delete" onclick="removeJournalNote('${b.id}')">✕</button>
      <div class="je-top">
        <div class="je-color" style="background:${p.color}"></div>
        <div class="je-proj" style="color:${p.color}">${p.emoji} ${p.name}</div>
        <div class="je-date">${b.date} · ${b.start}</div>
      </div>
      <div class="je-title">${b.title}</div>
      <div class="je-note">${b.note}</div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <span class="status-badge status-${b.status||'todo'}">${STATUS_LABELS[b.status||'todo']}</span>
        ${b.reason?`<span style="font-size:10px;color:var(--muted);">📌 ${b.reason}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function removeJournalNote(id) {
  const b = state.blocks.find(x=>x.id===id); if(!b) return;
  if(confirm('Supprimer la note ?')) { b.note=''; save(); renderJournal(); }
}

/* ═══════════════════════════════════════════
   RAPPORT HEBDOMADAIRE
═══════════════════════════════════════════ */
function renderReport() {
  const ws = getWeekStart(0);
  const wKeys = Array.from({length:7},(_,i)=>{ const d=new Date(ws);d.setDate(d.getDate()+i);return dateKey(d); });
  const weekBlocks = state.blocks.filter(b=>wKeys.includes(b.date));

  const done = weekBlocks.filter(b=>b.status==='done');
  const delayed = weekBlocks.filter(b=>b.status==='delayed');
  const cancelled = weekBlocks.filter(b=>b.status==='cancelled');
  const todo = weekBlocks.filter(b=>!b.status||b.status==='todo'||b.status==='doing');
  const withNotes = weekBlocks.filter(b=>b.note);

  const totalHrs = done.reduce((a,b)=>{ return a+(timeToMin(b.end)-timeToMin(b.start))/60; },0);
  const totalHrsAll = weekBlocks.reduce((a,b)=>{ return a+(timeToMin(b.end)-timeToMin(b.start))/60; },0);

  // Finance résumé
  const now = new Date();
  const thisWeekTx = state.transactions.filter(t=>wKeys.includes(t.date));
  const wIncome = thisWeekTx.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const wExpense = thisWeekTx.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);

  const completionRate = weekBlocks.length > 0 ? Math.round(done.length/weekBlocks.length*100) : 0;
  const scoreEmoji = completionRate >= 80 ? '🏆' : completionRate >= 60 ? '💪' : completionRate >= 40 ? '📈' : '🚀';

  document.getElementById('reportContent').innerHTML = `
    <div class="card" style="background:linear-gradient(135deg,var(--surface),var(--surface2));margin-bottom:14px;">
      <div style="text-align:center;padding:8px 0;">
        <div style="font-size:36px;margin-bottom:8px;">${scoreEmoji}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.06em;color:var(--amber);">Rapport Hebdomadaire</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">${ws.getDate()} ${MONTH_FULL[ws.getMonth()]} – ${(()=>{const e=new Date(ws);e.setDate(e.getDate()+6);return e.getDate()+' '+MONTH_FULL[e.getMonth()]})()}</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${weekBlocks.length}</div><div class="stat-lbl">Blocs planifiés</div></div>
      <div class="stat-box"><div class="stat-num">${totalHrsAll.toFixed(1)}h</div><div class="stat-lbl">Heures planifiées</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${done.length}</div><div class="stat-lbl">Terminés</div></div>
      <div class="stat-box"><div class="stat-num">${completionRate}%</div><div class="stat-lbl">Complétion</div></div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="card-header"><div class="card-title">Score de la semaine</div></div>
      <div class="progress-wrap" style="height:10px;margin-bottom:8px;">
        <div class="progress-bar" style="width:${completionRate}%;background:${completionRate>=80?'var(--green)':completionRate>=50?'var(--amber)':'var(--red)'};"></div>
      </div>
      <div style="font-size:12px;color:var(--muted);">
        ${completionRate>=80?'🔥 Excellente semaine ! Tu es dans le flow.':completionRate>=60?'💪 Bonne semaine. Continue comme ça !':completionRate>=40?'📈 Semaine correcte. Tu peux pousser plus fort !':'🚀 Semaine difficile. Réajuste tes objectifs.'}
      </div>
    </div>

    <div class="report-section">
      <div class="report-section-title">✅ Terminés (${done.length})</div>
      ${done.length===0?'<div style="color:var(--muted);font-size:12px;padding:8px;">Aucun bloc terminé cette semaine.</div>':
      done.map(b=>{const p=proj(b.project);return `<div class="report-item"><div class="report-icon">${p.emoji}</div><div><div class="report-name">${b.title}</div><div class="report-reason">${p.name} · ${b.start}–${b.end}${b.note?'<br>'+b.note:''}</div></div></div>`;}).join('')}
    </div>

    <div class="report-section">
      <div class="report-section-title">⏸ Reportés (${delayed.length})</div>
      ${delayed.length===0?'<div style="color:var(--muted);font-size:12px;padding:8px;">Rien de reporté !</div>':
      delayed.map(b=>{const p=proj(b.project);return `<div class="report-item"><div class="report-icon">⏸</div><div><div class="report-name">${b.title}</div><div class="report-reason">${p.name}${b.reason?'<br>Raison : '+b.reason:''}</div></div></div>`;}).join('')}
    </div>

    <div class="report-section">
      <div class="report-section-title">❌ Annulés (${cancelled.length})</div>
      ${cancelled.length===0?'<div style="color:var(--muted);font-size:12px;padding:8px;">Rien d\'annulé !</div>':
      cancelled.map(b=>{const p=proj(b.project);return `<div class="report-item"><div class="report-icon">❌</div><div><div class="report-name">${b.title}</div><div class="report-reason">${p.name}${b.reason?'<br>Raison : '+b.reason:''}</div></div></div>`;}).join('')}
    </div>

    <div class="report-section">
      <div class="report-section-title">📝 Journal de la semaine (${withNotes.length})</div>
      ${withNotes.length===0?'<div style="color:var(--muted);font-size:12px;padding:8px;">Aucune note cette semaine.</div>':
      withNotes.map(b=>{const p=proj(b.project);return `<div class="report-item"><div class="report-icon">${p.emoji}</div><div><div class="report-name">${b.title}</div><div class="report-reason">${b.note}</div></div></div>`;}).join('')}
    </div>

    <div class="report-section">
      <div class="report-section-title">💰 Résumé financier</div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${fmt$(wIncome)}</div><div class="stat-lbl">Revenus semaine</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${fmt$(wExpense)}</div><div class="stat-lbl">Dépenses semaine</div></div>
      </div>
      <div class="card" style="margin-top:6px;">
        <div style="font-size:12px;color:var(--muted);line-height:1.7;">
          ${wIncome===0&&wExpense===0?'Aucune transaction cette semaine. Commence à enregistrer tes revenus et dépenses dans la section Budget !':
          `Balance : <strong style="color:${wIncome-wExpense>=0?'var(--green)':'var(--red)'}">${fmt$(wIncome-wExpense)}</strong><br>
          ${wExpense>800?'⚠️ Dépenses élevées cette semaine. Regarde où va ton argent.':
           wExpense>400?'📊 Dépenses modérées. Surveille les loisirs et restos.':
           '✅ Bonne gestion des dépenses cette semaine !'}`}
        </div>
      </div>
    </div>

    <div class="report-section">
      <div class="report-section-title">🎯 Recommandations</div>
      <div class="card">
        <div style="font-size:12px;line-height:1.8;color:var(--muted);">
          ${todo.length>0?`📌 Tu as ${todo.length} bloc${todo.length>1?'s':''} non terminé${todo.length>1?'s':''}. N'oublie pas de les marquer ou les reporter.<br>`:''}
          ${delayed.length>0?`⏩ ${delayed.length} activité${delayed.length>1?'s':''} reportée${delayed.length>1?'s':''}. Planifie-les en priorité la semaine prochaine.<br>`:''}
          ${completionRate<50?'💡 Conseil : réduis le nombre de blocs par jour pour mieux te concentrer.<br>':''}
          ${completionRate>=80?'🔥 Super semaine ! Maintiens ce rythme.<br>':''}
          ${wExpense>wIncome?'💸 Tes dépenses dépassent tes revenus cette semaine. Surveille ton budget Loisirs.':''}
        </div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════
   INIT DATA (default Joshua blocks)
═══════════════════════════════════════════ */
function initDefaultData() {
  if(state.blocks.length > 0) return;
  const today = new Date();
  const mondayOffset = (today.getDay()+6)%7;
  const addB = (dayOffset,project,title,start,end,status='todo') => {
    const d = new Date(today);
    d.setDate(today.getDate()-mondayOffset+dayOffset);
    state.blocks.push({id:Date.now()+Math.random(),date:dateKey(d),project,title,start,end,status,note:'',priority:'med',budget:0,actual:0,reason:'',created:new Date().toISOString()});
  };
  [0,1,2,3].forEach(i=>addB(i,'travail','Patrick Morin','06:00','15:00','todo'));
  addB(0,'memora','Cold calls + pitchs Memora','18:00','20:00','todo');
  addB(1,'memora','Exécution client Memora','18:00','20:00','todo');
  addB(2,'portrait','Pratique photo','18:00','20:00','todo');
  addB(3,'portrait','Édition photos','18:00','20:00','todo');
  addB(0,'gym','Gym','20:30','22:00','todo');
  addB(2,'gym','Gym','20:30','22:00','todo');
  addB(4,'gym','Gym','10:00','12:00','todo');
  addB(1,'francais','Cours français S5','20:30','21:30','todo');
  addB(3,'francais','Cours français S5','20:30','21:30','todo');

  if(state.transactions.length===0) {
    const today = dateKey(new Date());
    state.transactions.push({id:'t1',type:'income',amount:1000,desc:'Salaire Patrick Morin',cat:'salaire',date:today,note:'Chèque bi-mensuel'});
    state.transactions.push({id:'t2',type:'expense',amount:150,desc:'Assurance voiture',cat:'abonnements',date:today,note:''});
    state.transactions.push({id:'t3',type:'expense',amount:89,desc:'Assurance téléphone',cat:'abonnements',date:today,note:''});
    state.transactions.push({id:'t4',type:'expense',amount:80,desc:'Soins dentaires',cat:'sante',date:today,note:'Coquilles'});
    state.transactions.push({id:'t5',type:'expense',amount:95,desc:'Restos + sorties',cat:'restaurants',date:today,note:''});
    state.transactions.push({id:'t6',type:'expense',amount:120,desc:'Trip Trois-Rivières',cat:'transport',date:today,note:'Voir copine'});

    state.budgets.push({id:'b1',cat:'restaurants',amount:150});
    state.budgets.push({id:'b2',cat:'transport',amount:250});
    state.budgets.push({id:'b3',cat:'loisirs',amount:100});
    state.budgets.push({id:'b4',cat:'epargne',amount:500});
  }
  save();
}
